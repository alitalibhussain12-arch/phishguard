<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PhishGuard AI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark pg-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('main.index') }}">
      <span class="pg-logo-icon"><i class="bi bi-shield-fill-check"></i></span>
      <span class="pg-logo-text">PhishGuard <span class="text-primary">AI</span></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.index') }}">
            <i class="bi bi-grid me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.analyze' %}active{% endif %}"
             href="{{ url_for('main.analyze') }}">
            <i class="bi bi-search me-1"></i>Analyze
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.history' %}active{% endif %}"
             href="{{ url_for('main.history') }}">
            <i class="bi bi-clock-history me-1"></i>History
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.train_page' %}active{% endif %}"
             href="{{ url_for('main.train_page') }}">
            <i class="bi bi-cpu me-1"></i>Train Model
          </a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="btn btn-sm btn-outline-primary" href="/api/health" target="_blank">
            <i class="bi bi-activity me-1"></i>API Health
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Flash messages -->
<div class="container-fluid px-4 mt-3">
  {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ 'danger' if cat == 'danger' else 'warning' if cat == 'warning' else 'success' }} alert-dismissible fade show" role="alert">
      <i class="bi bi-{{ 'exclamation-triangle' if cat in ('danger','warning') else 'check-circle' }} me-2"></i>{{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>

<!-- Main content -->
<main class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="pg-footer text-center text-muted py-3 mt-4">
  <small>
    <i class="bi bi-shield-fill-check text-primary me-1"></i>
    PhishGuard AI v1.0.0 &mdash; MIT License &mdash;
    <a href="https://github.com/yourusername/phishguard" class="text-muted" target="_blank">GitHub</a>
  </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
